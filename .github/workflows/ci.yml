name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  CARGO_TERM_COLOR: always
  NODE_VERSION: '20'

jobs:
  # ─── TypeScript Unit Tests ───
  unit-tests:
    name: Unit Tests (TypeScript)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: krakenegg-app
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
          cache-dependency-path: krakenegg-app/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm test
        name: Run 499 unit tests

  # ─── Rust Backend Tests ───
  rust-tests:
    name: Unit Tests (Rust)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: krakenegg-app/src-tauri
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: krakenegg-app/src-tauri
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libgtk-3-dev
      - run: cargo test --lib
        name: Run 109 Rust tests

  # ─── Rust Clippy Lint ───
  rust-lint:
    name: Rust Lint (Clippy)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: krakenegg-app/src-tauri
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: krakenegg-app/src-tauri
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libgtk-3-dev
      - run: cargo clippy -- -D warnings
        name: Clippy lint check

  # ─── E2E Integration Tests ───
  e2e-tests:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: krakenegg-app
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
          cache-dependency-path: krakenegg-app/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: npx playwright install chromium
      - run: npx playwright test
        name: Run 461 E2E tests

  # ─── Build Check ───
  build:
    name: Build Check
    runs-on: ubuntu-latest
    needs: [unit-tests, rust-tests]
    defaults:
      run:
        working-directory: krakenegg-app
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: krakenegg-app/src-tauri
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
          cache-dependency-path: krakenegg-app/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libgtk-3-dev
      - run: pnpm build
        name: Build frontend
      - run: cd src-tauri && cargo check
        name: Check Rust compilation
