<!DOCTYPE html>
<html>
<head>
    <title>KrakenEgg Integration Test</title>
    <style>
        body { font-family: monospace; padding: 20px; background: #1a1a1a; color: #fff; }
        .output { background: #000; padding: 10px; margin: 10px 0; border-radius: 5px; }
        button { padding: 10px; margin: 5px; }
    </style>
</head>
<body>
    <h1>🦑 KrakenEgg Integration Test</h1>
    <button onclick="testTauriAvailability()">Test Tauri Availability</button>
    <button onclick="testHomeDirectory()">Test Home Directory</button>
    <button onclick="testListDirectory()">Test List Directory</button>

    <div id="output" class="output">
        Ready to test...
    </div>

    <script>
        function log(message) {
            const output = document.getElementById('output');
            output.innerHTML += message + '\n';
            console.log(message);
        }

        function testTauriAvailability() {
            log('🦑 Testing Tauri availability...');
            log('Window object: ' + (typeof window !== 'undefined' ? 'available' : 'not available'));
            log('__TAURI__ in window: ' + (typeof window !== 'undefined' && '__TAURI__' in window));
            log('__TAURI__ object: ' + JSON.stringify(window.__TAURI__ || 'not found'));
        }

        async function testHomeDirectory() {
            log('🦑 Testing home directory...');
            try {
                if (typeof window.__TAURI__ !== 'undefined' && window.__TAURI__.core) {
                    const result = await window.__TAURI__.core.invoke('get_home_directory');
                    log('✅ Home directory: ' + result);
                } else {
                    log('❌ Tauri core not available');
                }
            } catch (error) {
                log('❌ Error: ' + error.message);
            }
        }

        async function testListDirectory() {
            log('🦑 Testing list directory...');
            try {
                if (typeof window.__TAURI__ !== 'undefined' && window.__TAURI__.core) {
                    const homeDir = await window.__TAURI__.core.invoke('get_home_directory');
                    log('📁 Home directory: ' + homeDir);

                    const listing = await window.__TAURI__.core.invoke('list_directory', { path: homeDir });
                    log('✅ Found ' + listing.files.length + ' files/directories');
                    log('📊 Stats: ' + listing.file_count + ' files, ' + listing.directory_count + ' directories');

                    // Show first few files
                    const first5 = listing.files.slice(0, 5);
                    first5.forEach(file => {
                        log('  📄 ' + file.name + (file.is_directory ? ' (dir)' : ' (' + file.size + ' bytes)'));
                    });
                } else {
                    log('❌ Tauri core not available');
                }
            } catch (error) {
                log('❌ Error: ' + error.message);
            }
        }

        // Auto-test on load
        setTimeout(() => {
            testTauriAvailability();
        }, 1000);
    </script>
</body>
</html>
